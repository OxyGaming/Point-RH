name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, tests & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Valeurs factices réservées à la CI — ne doivent jamais servir en production.
      # DATABASE_URL : `prisma generate` lit seulement le provider, pas la DB elle-même.
      # JWT_SECRET   : requis pour que le build n'échoue pas sur la validation de config.
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-only-jwt-secret-not-used-in-production-64-chars-minimum-xxxxxx

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Indispensable : `tsc --noEmit` et Jest dépendent des types générés par Prisma
      # (sinon les retours de findMany/findUnique sont `any` → erreurs implicit any
      # sur toutes les callbacks .map/.filter + "PrismaClient has no exported member"
      # dans prisma/seed.ts).
      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Jest)
        id: jest
        run: |
          set +e
          npm test -- --ci > jest-output.log 2>&1
          code=$?
          cat jest-output.log
          exit $code
        shell: bash

      - name: Emit Jest output as single annotation on failure
        if: failure() && steps.jest.conclusion == 'failure'
        run: |
          content=$(cat jest-output.log | head -c 50000 | sed 's/%/%25/g' | awk 'BEGIN{ORS="%0A"}{print}')
          printf '::error title=Jest failure::%s\n' "$content"
        shell: bash

      - name: Build (next build)
        run: npm run build
