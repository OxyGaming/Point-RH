name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, tests & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Valeurs factices réservées à la CI — ne doivent jamais servir en production.
      # DATABASE_URL : `prisma generate` lit seulement le provider, pas la DB elle-même.
      # JWT_SECRET   : requis pour que le build n'échoue pas sur la validation de config.
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-only-jwt-secret-not-used-in-production-64-chars-minimum-xxxxxx

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Indispensable : `tsc --noEmit` et Jest dépendent des types générés par Prisma
      # (sinon les retours de findMany/findUnique sont `any` → erreurs implicit any
      # sur toutes les callbacks .map/.filter + "PrismaClient has no exported member"
      # dans prisma/seed.ts).
      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Jest)
        id: jest
        run: npm test -- --ci 2>&1 | tee jest-output.log
        shell: bash

      - name: Dump Jest log to step summary on failure
        if: failure() && steps.jest.conclusion == 'failure'
        run: |
          echo "## Jest output (full)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -c 60000 jest-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Build (next build)
        run: npm run build
